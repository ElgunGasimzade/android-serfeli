<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/><title>watchlist_manage</title><script src="https://cdn.tailwindcss.com"></script><script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script><style>        :root {            --primary: #059669;            --primary-dark: #047857;            --primary-light: #D1FAE5;            --bg-canvas: #F9FAFB;            --card-bg: #FFFFFF;            --text-main: #111827;            --text-sub: #6B7280;            --border-subtle: #E5E7EB;            --badge-sale: #FFF1F2;            --text-sale: #BE123C;        }        body {            margin: 0;            padding: 0;            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;            background-color: #f3f4f6;        }        .iphone-frame {            width: 393px;            height: 852px;            background-color: #ffffff;            position: relative;            border-radius: 0px;            box-shadow: 0 0 20px rgba(0,0,0,0.1);            overflow: hidden;            margin: 2rem auto;        }        .no-scrollbar::-webkit-scrollbar {            display: none;        }        .no-scrollbar {            -ms-overflow-style: none;            scrollbar-width: none;        }        .pulse-ring {            box-shadow: 0 0 0 0 rgba(5, 150, 105, 0.7);            animation: pulse-green 2s infinite cubic-bezier(0.66, 0, 0, 1);        }        @keyframes pulse-green {            0% { box-shadow: 0 0 0 0 rgba(5, 150, 105, 0.7); }            70% { box-shadow: 0 0 0 6px rgba(5, 150, 105, 0); }            100% { box-shadow: 0 0 0 0 rgba(5, 150, 105, 0); }        }    </style></head><body><!-- #app-container_700 --><div class="iphone-frame flex flex-col bg-[var(--bg-canvas)]"><!-- #header_701 --><div class="px-6 pt-12 pb-2 bg-white sticky top-0 z-30"><div class="flex justify-between items-center mb-4"><h1 class="text-[28px] font-bold text-[var(--text-main)]">My Watchlist</h1><button class="text-[var(--primary)] font-semibold text-sm">Edit</button></div><!-- #input-area_702 --><div class="relative mb-4"><input class="w-full h-12 pl-11 pr-12 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-[var(--primary)] focus:ring-1 focus:ring-[var(--primary)] transition-all" placeholder="Add item (e.g. Diapers, Coffee)..." type="text"/><iconify-icon class="absolute left-3.5 top-3.5 text-gray-400 text-lg" icon="lucide:plus"></iconify-icon><button class="absolute right-2 top-2 h-8 px-3 bg-[var(--text-main)] text-white rounded-lg text-xs font-bold">                    Add                </button></div><!-- /#input-area_702 --><!-- #quick-add-suggestions_703 --><div class="mb-2"><div class="text-[10px] font-bold text-[var(--text-sub)] uppercase tracking-wider mb-2">Popular Essentials</div><div class="flex gap-2 overflow-x-auto no-scrollbar pb-2"><!-- #chip-milk_704 --><button class="flex items-center gap-1.5 px-3 py-1.5 bg-white border border-gray-200 rounded-full shadow-sm active:scale-95 transition-transform"><span class="text-lg">🥛</span><span class="text-sm font-medium text-[var(--text-main)]">Milk</span></button><!-- /#chip-milk_704 --><!-- #chip-eggs_705 --><button class="flex items-center gap-1.5 px-3 py-1.5 bg-white border border-gray-200 rounded-full shadow-sm active:scale-95 transition-transform"><span class="text-lg">🥚</span><span class="text-sm font-medium text-[var(--text-main)]">Eggs</span></button><!-- /#chip-eggs_705 --><!-- #chip-bread_706 --><button class="flex items-center gap-1.5 px-3 py-1.5 bg-white border border-gray-200 rounded-full shadow-sm active:scale-95 transition-transform"><span class="text-lg">🍞</span><span class="text-sm font-medium text-[var(--text-main)]">Bread</span></button><!-- /#chip-bread_706 --><!-- #chip-tp_707 --><button class="flex items-center gap-1.5 px-3 py-1.5 bg-white border border-gray-200 rounded-full shadow-sm active:scale-95 transition-transform"><span class="text-lg">🧻</span><span class="text-sm font-medium text-[var(--text-main)]">TP</span></button><!-- /#chip-tp_707 --></div></div><!-- /#quick-add-suggestions_703 --></div><!-- /#header_701 --><!-- #list-content_708 --><div class="flex-1 overflow-y-auto px-6 py-4 space-y-3 pb-24"><!-- #list-item-1_709 --><!-- Status: Deal Found --><div class="bg-white p-4 rounded-2xl border border-[var(--primary-light)] shadow-sm relative overflow-hidden"><div class="absolute left-0 top-0 bottom-0 w-1 bg-[var(--primary)]"></div><div class="flex items-center justify-between"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-[var(--primary-light)] flex items-center justify-center text-[var(--primary)]"><iconify-icon icon="lucide:milk" width="20"></iconify-icon></div><div><h3 class="font-bold text-[var(--text-main)] text-[15px]">Milk (Gallon)</h3><div class="text-xs text-[var(--primary)] font-medium flex items-center gap-1"><iconify-icon icon="lucide:check-circle-2" width="12"></iconify-icon>                                2 Deals Found                            </div></div></div><div class="flex flex-col items-end"><span class="bg-[var(--text-sale)] text-white text-[10px] font-bold px-2 py-0.5 rounded-full mb-1">-30%</span><iconify-icon class="text-gray-300" icon="lucide:chevron-right"></iconify-icon></div></div></div><!-- /#list-item-1_709 --><!-- #list-item-2_710 --><!-- Status: Watching --><div class="bg-white p-4 rounded-2xl border border-[var(--border-subtle)] shadow-sm opacity-90"><div class="flex items-center justify-between"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-orange-50 flex items-center justify-center text-orange-500"><iconify-icon icon="lucide:egg" width="20"></iconify-icon></div><div><h3 class="font-bold text-[var(--text-main)] text-[15px]">Organic Eggs</h3><div class="text-xs text-[var(--text-sub)] flex items-center gap-1"><div class="w-1.5 h-1.5 rounded-full bg-gray-400 animate-pulse"></div>                                Watching prices...                            </div></div></div><div class="text-[var(--text-sub)]"><iconify-icon class="animate-spin" icon="lucide:loader-2" width="16"></iconify-icon></div></div></div><!-- /#list-item-2_710 --><!-- #list-item-3_711 --><!-- Status: Manual Entry --><div class="bg-white p-4 rounded-2xl border border-[var(--border-subtle)] shadow-sm"><div class="flex items-center justify-between"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-500"><iconify-icon icon="lucide:list-todo" width="20"></iconify-icon></div><div><h3 class="font-bold text-[var(--text-main)] text-[15px]">Paper Towels</h3><div class="text-xs text-[var(--text-sub)] flex items-center gap-1"><div class="w-1.5 h-1.5 rounded-full bg-gray-400 animate-pulse"></div>                                Watching prices...                            </div></div></div></div></div><!-- /#list-item-3_711 --><!-- #list-item-4_712 --><!-- Status: Manual Entry Custom --><div class="bg-white p-4 rounded-2xl border border-[var(--border-subtle)] shadow-sm"><div class="flex items-center justify-between"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-purple-50 flex items-center justify-center text-purple-500"><iconify-icon icon="lucide:pen-tool" width="20"></iconify-icon></div><div><h3 class="font-bold text-[var(--text-main)] text-[15px]">Specific Cat Food</h3><div class="text-xs text-[var(--text-sub)] flex items-center gap-1"><div class="w-1.5 h-1.5 rounded-full bg-gray-400 animate-pulse"></div>                                Watching prices...                            </div></div></div></div></div><!-- /#list-item-4_712 --></div><!-- /#list-content_708 --><!-- #empty-state-hint_713 --><div class="absolute bottom-28 left-6 right-6 pointer-events-none"><div class="bg-[var(--text-main)] text-white text-xs p-3 rounded-xl shadow-lg opacity-0 animate-[fade-in-up_1s_ease-out_2s_forwards] flex items-center gap-2"><iconify-icon icon="lucide:info" width="14"></iconify-icon>                 We"ll notify you instantly when any of these drop in price.             </div></div><!-- /#empty-state-hint_713 --><!-- #tab-bar_714 --><div class="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-100 h-[84px] flex items-start pt-3 justify-around z-40"><!-- #tab-home_715 --><div class="flex flex-col items-center gap-1 w-16 opacity-50"><iconify-icon class="text-[var(--text-main)] text-2xl" icon="lucide:home"></iconify-icon><span class="text-[10px] font-medium text-[var(--text-main)]">Home</span></div><!-- /#tab-home_715 --><!-- #tab-scan_716 --><div class="flex flex-col items-center gap-1 w-16 opacity-50"><iconify-icon class="text-[var(--text-main)] text-2xl" icon="lucide:scan-line"></iconify-icon><span class="text-[10px] font-medium text-[var(--text-main)]">Scan</span></div><!-- /#tab-scan_716 --><!-- #tab-saved_717 --><div class="flex flex-col items-center gap-1 w-16"><iconify-icon class="text-[var(--primary)] text-2xl" icon="lucide:heart"></iconify-icon><span class="text-[10px] font-medium text-[var(--primary)]">Saved</span></div><!-- /#tab-saved_717 --><!-- #tab-profile_718 --><div class="flex flex-col items-center gap-1 w-16 opacity-50"><iconify-icon class="text-[var(--text-main)] text-2xl" icon="lucide:user"></iconify-icon><span class="text-[10px] font-medium text-[var(--text-main)]">Profile</span></div><!-- /#tab-profile_718 --></div><!-- /#tab-bar_714 --></div><!-- /#app-container_700 --></body></html>
